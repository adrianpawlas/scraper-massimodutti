name: Run Massimo Dutti Scraper

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-siglip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure API URLs (optional secret override)
        run: |
          if [ -n "${{ secrets.API_URLS }}" ]; then
            echo "${{ secrets.API_URLS }}" > api_urls.txt
          fi

      - name: Run scraper
        run: |
          if [ ! -s api_urls.txt ]; then
            echo "No API URLs. Add API_URLS secret or commit URLs in api_urls.txt"
            exit 1
          fi
          python run.py
